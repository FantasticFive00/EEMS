<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Medical Claim</title>
    <link rel="stylesheet" href="CSS/Medical.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Top Navigation -->
<header class="top-nav">
    <nav class="nav-menu">
        <a href="#">Dashboard</a>
        <a href="#">Account Profile</a>
        <a href="#" class="active">Create Claim</a>
    </nav>

    <div class="nav-icons">
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-envelope"></i>
        <i class="fa-solid fa-user-circle"></i>
    </div>
</header>

<!-- Breadcrumb -->
<div class="breadcrumb">
    Dashboard &gt; Apply for Claim
</div>

<!-- Main Content -->
<main class="page-container">

    <section class="claim-card">

        <div class="claim-header">
            <i class="fa-solid fa-book-open"></i>
            <h2>Claim Form</h2>
        </div>

        <p class="claim-desc">
            Fill the required fields below to apply for claim
        </p>

        <form>

            <!-- Claim Type -->
            <div class="form-group full">
                <label>Claim Type</label>
                <input type="text" value="Medical" readonly>
            </div>

            <!-- Employee ID & Name -->
            <div class="form-row">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text">
                </div>
            </div>

            <!-- Clinic & Diagnosis -->
            <div class="form-row">
                <div class="form-group">
                    <label>Clinic Name</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Diagnosis</label>
                    <select id="diagnosis" onchange="toggleOtherDiagnosis()">
                        <option value="">-- Select Diagnosis --</option>
                        <option value="Flu">Flu</option>
                        <option value="Cough">Cough</option>
                        <option value="Fever">Fever</option>
                        <option value="Other">Others</option>
                    </select>
                </div>
            </div>

            <!-- Other Diagnosis -->
            <div class="form-group full" id="otherDiagnosisBox" style="display:none;">
                <label>Other Diagnosis</label>
                <input type="text" placeholder="Please specify">
            </div>

            <!-- MRN Doctor -->
            <div class="form-group">
                <label>MRN Doctor</label>
                <input type="number">
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label>Amount</label>
                <input type="number" step="0.01">
            </div>

            <!-- Save Button -->
            <div class="form-action">
                <button type="submit">Save</button>
            </div>

        </form>

    </section>

</main>

<script>
    function toggleOtherDiagnosis() {
        const diagnosis = document.getElementById("diagnosis").value;
        const otherBox = document.getElementById("otherDiagnosisBox");

        otherBox.style.display = (diagnosis === "Other") ? "block" : "none";
    }
</script>
</body>
</html>
